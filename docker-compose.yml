version: '3.8'

services:
  awg-control:
    build: .
    container_name: awg-control
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - /etc/amneziawg:/config
    ports:
      - "3000:3000"
    environment:
      - API_KEY=change_me_please
      - CONF_DIR=/config
      - SERVER_IFACE=awg-server
      - PORT=3000
